name: بناء APK - مصاريفي

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - uses: actions/setup-java@v4
        with: {distribution: 'temurin', java-version: '17'}

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev python3-pip make
          pip3 install --user buildozer cython pillow python-for-android setuptools wheel
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build APK
        run: |
          set -x
          export JAVA_HOME=$JAVA_HOME_17_JRE
          export PATH=$JAVA_HOME/bin:$HOME/.local/bin:$PATH
          python3 -m pythonforandroid.toolchain create \
            --dist_name=masarify \
            --bootstrap=sdl2 \
            --requirements=python3,kivy==2.3.1,kivymd==1.2.0,plyer \
            --arch=arm64-v8a \
            --copy-libs \
            --storage-dir=.buildozer/android/platform/build-arm64-v8a \
            --ndk-api=21 \
            --ignore-setup-py \
            2>&1
        continue-on-error: true

      - name: Check
        if: always()
        run: |
          find . -name "*.apk" 2>/dev/null
          find .buildozer -name "*.apk" 2>/dev/null
          ls -la .buildozer/android/platform/build-arm64-v8a/dists/masarify__arm64-v8a/bin/ 2>/dev/null
