name: بناء APK - مصاريفي

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - uses: actions/setup-java@v4
        with: {distribution: 'temurin', java-version: '17'}

      - name: Install
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git zip unzip autoconf libtool pkg-config zlib1g-dev \
            libncurses-dev cmake libffi-dev libssl-dev python3-pip make ccache
          pip3 install --user buildozer cython pillow python-for-android setuptools wheel
          echo "JAVA_HOME=$JAVA_HOME_17_JRE" >> $GITHUB_ENV
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build with buildozer
        run: |
          export JAVA_HOME=$JAVA_HOME_17_JRE
          java -version 2>&1
          gcc --version 2>&1 | head -1
          python3 -m buildozer android debug 2>&1
        continue-on-error: true

      - name: Find APK
        if: always()
        run: |
          find . -name "*.apk" -type f 2>/dev/null
          # Also look in .buildozer
          find .buildozer -name "*.apk" -type f 2>/dev/null
