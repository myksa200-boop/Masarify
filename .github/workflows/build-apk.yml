name: بناء APK - مصاريفي

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev python3-pip make
          pip3 install --user buildozer cython pillow python-for-android setuptools wheel
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build APK
        id: build
        run: |
          export JAVA_HOME=$JAVA_HOME_17_JRE
          export PATH=$JAVA_HOME/bin:$PATH
          python3 -m buildozer android debug 2>&1 | tee build_output.log || true
          echo "---END BUILD---"

      - name: Show log
        if: always()
        run: |
          echo "=== BUILD LOG (FULL) ==="
          cat build_output.log 2>/dev/null || echo "NO LOG FILE"
          echo "=== END LOG ==="
          echo "=== BIN DIR ==="
          ls -la bin/ 2>/dev/null || echo "No bin dir"
          echo "=== .buildozer ==="
          ls -la .buildozer/ 2>/dev/null | head -5 || echo "No .buildozer"
          echo "=== JAVA ==="
          java -version 2>&1

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.log

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Masarify-APK
          path: bin/*.apk
          if-no-files-found: ignore
