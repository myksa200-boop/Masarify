name: بناء APK - مصاريفي

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev python3-pip make
          pip3 install --user buildozer cython pillow python-for-android setuptools wheel
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build APK
        run: |
          export JAVA_HOME=$JAVA_HOME_17_JRE
          export PATH=$JAVA_HOME/bin:$HOME/.local/bin:$PATH
          echo "JAVA: $(java -version 2>&1 | head -1)"
          echo "BUILDOZER: $(python3 -c 'import buildozer; print(buildozer.__file__)' 2>&1)"
          echo "PWD: $(pwd)"
          echo "LS: $(ls -la)"
          echo "Starting build..."
          python3 -m buildozer android debug 2>&1
        continue-on-error: true

      - name: Show output
        if: always()
        run: |
          echo "=== STDOUT CAPTURE ==="
          cat build_output.log 2>/dev/null
          echo "=== BUILD DIR ==="
          ls -la .buildozer/ 2>/dev/null
          echo "=== BIN ===" 
          ls -la bin/ 2>/dev/null
