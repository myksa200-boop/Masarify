name: بناء APK - مصاريفي

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - uses: actions/setup-java@v4
        with: {distribution: 'temurin', java-version: '17'}

      - name: Install
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git zip unzip autoconf libtool pkg-config zlib1g-dev \
            libncurses-dev cmake libffi-dev libssl-dev python3-pip make ccache
          pip3 install --user --upgrade buildozer cython pillow python-for-android setuptools wheel

      - name: Build
        run: |
          set -e  # Exit on error
          export JAVA_HOME=$JAVA_HOME_17_JRE
          export PATH=$JAVA_HOME/bin:$HOME/.local/bin:$PATH
          echo "=== ENV ==="
          which java python3 buildozer
          python3 -m buildozer --version
          echo "=== FILES ==="
          ls -la
          echo "=== BUILD START ==="
          python3 -m buildozer android debug 2>&1
