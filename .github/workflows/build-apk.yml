name: Build Masarify APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - uses: actions/setup-java@v4
        with: {distribution: 'temurin', java-version: '17'}

      - name: Install
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev make ccache
          pip install --user buildozer cython pillow python-for-android setuptools wheel

      - name: Build
        run: |
          export JAVA_HOME=$JAVA_HOME_17_JRE
          export PATH=$JAVA_HOME/bin:$HOME/.local/bin:$PATH
          python3 -c "import buildozer; print('OK:', buildozer.__file__)"
          python3 -m buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Masarify-APK
          path: bin/*.apk
