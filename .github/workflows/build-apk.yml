name: بناء APK - مصاريفي

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev python3-pip
          pip3 install --user buildozer cython pillow

      - name: 🛠️ Build APK
        run: |
          export JAVA_HOME=$JAVA_HOME_17_JRE
          export PATH=$JAVA_HOME/bin:$PATH
          python3 -m buildozer android debug

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Masarify-APK
          path: bin/*.apk
          if-no-files-found: error

      - name: 📤 Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: bin/*.apk
